<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - LucasApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <canvas id="particles"></canvas>

    <nav>
        <div class="logo">Lucas<span>App</span></div>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-box">
            <h1 id="auth-title">Connexion</h1>
            <p id="auth-subtitle">Content de te revoir 👋</p>

            <div class="auth-form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Mot de passe">
                <button onclick="authentifier()" id="auth-btn">Se connecter 🚀</button>
            </div>

            <div id="auth-message"></div>

            <p class="auth-switch">
                <span id="switch-text">Pas encore de compte ?</span>
                <a href="#" onclick="basculer()" id="switch-link">S'inscrire</a>
            </p>
        </div>
    </section>

    <script>
        // Curseur
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            }, 80);
        });

        // Particules
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 0.5,
                opacity: Math.random() * 0.5 + 0.1
            });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Bascule connexion/inscription
        let modeInscription = false;

        function basculer() {
            modeInscription = !modeInscription;
            if (modeInscription) {
                document.getElementById('auth-title').textContent = 'Inscription';
                document.getElementById('auth-subtitle').textContent = 'Rejoins l\'aventure 🔥';
                document.getElementById('auth-btn').textContent = 'S\'inscrire 🚀';
                document.getElementById('switch-text').textContent = 'Déjà un compte ?';
                document.getElementById('switch-link').textContent = 'Se connecter';
            } else {
                document.getElementById('auth-title').textContent = 'Connexion';
                document.getElementById('auth-subtitle').textContent = 'Content de te revoir 👋';
                document.getElementById('auth-btn').textContent = 'Se connecter 🚀';
                document.getElementById('switch-text').textContent = 'Pas encore de compte ?';
                document.getElementById('switch-link').textContent = 'S\'inscrire';
            }
            document.getElementById('auth-message').textContent = '';
        }

        async function authentifier() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const message = document.getElementById('auth-message');

            if (!email || !password) {
                message.textContent = '❌ Remplis tous les champs !';
                message.style.color = 'red';
                return;
            }

            const route = modeInscription ? '/signup' : '/login';

            try {
                const response = await fetch('https://mon-premier-site-production.up.railway.app' + route, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.succès) {
                    message.textContent = modeInscription ? '🔥 Compte créé !' : '✅ Connecté !';
                    message.style.color = '#FFD700';
                } else {
                    message.textContent = '❌ ' + (data.erreur || 'Erreur');
                    message.style.color = 'red';
                }
            } catch (error) {
                message.textContent = '❌ Erreur, réessaie !';
                message.style.color = 'red';
            }
        }
    </script>

</body>
</html>
