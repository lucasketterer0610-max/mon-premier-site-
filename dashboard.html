<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - LucasApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">LucasApp Admin</div>
        <div class="nav-links">
            <a href="index.html">Retour au site</a>
        </div>
    </nav>

    <section id="login-section" class="hero">
        <h1>Accès <span>Admin</span></h1>
        <div class="form-container">
            <input type="password" id="password-input" placeholder="Mot de passe...">
            <button onclick="seConnecter()">Entrer 🔐</button>
        </div>
        <div id="login-message"></div>
    </section>

    <section id="dashboard-section" style="display:none">
        <section class="hero" style="height:auto; padding-top:120px; padding-bottom:40px">
            <h1>Dashboard <span>Admin</span></h1>
            <p>Bienvenue Lucas 👋</p>
        </section>

        <section class="dashboard">
            <div class="stat-card">
                <h2 id="total">0</h2>
                <p>Emails inscrits</p>
            </div>
        </section>

        <section class="emails-list">
            <h2>Liste des inscrits</h2>
            <div id="liste"></div>
        </section>
    </section>

    <script>
        const MOT_DE_PASSE = 'lucasapp2026';

        function seConnecter() {
            const input = document.getElementById('password-input');
            const message = document.getElementById('login-message');

            if (input.value === MOT_DE_PASSE) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                chargerEmails();
            } else {
                message.textContent = '❌ Mot de passe incorrect !';
                message.style.color = 'red';
            }
        }

        async function chargerEmails() {
            const response = await fetch('https://mon-premier-site-production.up.railway.app/emails');
            const data = await response.json();
            
            document.getElementById('total').textContent = data.emails.length;
            
            const liste = document.getElementById('liste');
            data.emails.forEach(email => {
                const div = document.createElement('div');
                div.className = 'email-item';
                div.textContent = email;
                liste.appendChild(div);
            });
        }

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') seConnecter();
        });
    </script>

</body>
</html>
